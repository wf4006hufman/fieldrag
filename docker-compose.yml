# Local pgvector-enabled Postgres for Day-1 development.
# Start:  docker compose up -d
# Stop:   docker compose down        (add -v to wipe data)
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fieldrag
      POSTGRES_USER: fieldrag
      POSTGRES_PASSWORD: fieldrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldrag"]
      interval: 3s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
